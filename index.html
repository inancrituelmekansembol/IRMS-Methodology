<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRMS - Integrated Representation Measurement System</title>
    <meta name="description" content="İnanç · Ritüel · Mekân · Sembol Ölçüm Sistemi. Göbeklitepe ile Ayasofya'yı aynı skalada ölçer. IRMS < 1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
   <script>
        let allArticlesData = [];

        // Sayfa yüklenir yüklenmez çalışacak ana motor
        window.addEventListener('DOMContentLoaded', () => {
            renderArticlesShowcase();
        });

        // VİTRİN MOTORU (Geliştirilmiş Güvenli Sürüm)
        function renderArticlesShowcase() {
            const container = document.getElementById('articles-showcase-container');
            container.innerHTML = "<p style='color:#8A857E;'>Yayınlar yükleniyor...</p>";

            // GitHub Pages yollarını garantiye almak için "./makaleler.json" kullanımı
            fetch('./makaleler.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error("HTTP hata kodu: " + response.status);
                    }
                    return response.json();
                })
                .then(articles => {
                    // Gelen verinin dizi (array) olduğundan emin olalım
                    if (Array.isArray(articles)) {
                        allArticlesData = articles;
                        displayArticles(articles);
                    } else {
                        container.innerHTML = "<p style='color:var(--accent);'>Hata: JSON verisi beklenen formatta değil (Dizi olmalı).</p>";
                    }
                })
                .catch(err => {
                    console.error("Arama Motoru Hatası:", err);
                    container.innerHTML = `
                        <div style="grid-column: 1/-1; border: 1px dashed var(--accent); padding: 20px; border-radius: 8px; background: rgba(164,73,47,0.05);">
                            <p style="color:var(--accent); font-weight:bold; margin-bottom: 8px;">⚠️ Yayınlar Listelenemedi</p>
                            <p style="font-size: 13px; color:#5E5A54;">Lütfen projenizin kök dizininde <strong>makaleler.json</strong> dosyasının olduğundan ve içinde yazım hatası (eksik virgül, tırnak işareti vb.) olmadığından emin olun.</p>
                        </div>
                    `;
                });
        }

        // MAKALELERİ VE BUTONLARI EKRANA BASAN MOTOR
        function displayArticles(articles) {
            const container = document.getElementById('articles-showcase-container');
            container.innerHTML = "";
            
            if (!articles || articles.length === 0) {
                container.innerHTML = "<p style='color:#8A857E; grid-column: 1/-1; text-align:center; padding: 20px;'>Eşleşen yayın veya rapor bulunamadı.</p>";
                return;
            }

            articles.forEach(art => {
                const card = document.createElement('div');
                card.className = 'library-card';
                
                // Akıllı Buton Metni Çözümü (Eğer veri varsa çalışır)
                let webBtnText = "→ İncele";
                if (art.url_web && art.url_web.includes('.html')) webBtnText = "🖥️ Raporu İncele";
                else if (art.url_web && art.url_web.includes('doi.org')) webBtnText = "→ Zenodo Verisi";

                // Eğer JSON'da link alanları boşsa butonlar hiç oluşturulmaz (Arayüz kırılmaz)
                const webLinkHtml = art.url_web ? `<a href="${art.url_web}" target="_blank" class="view-btn">${webBtnText}</a>` : '';
                const pdfLinkHtml = art.url_pdf ? `<a href="${art.url_pdf}" target="_blank" class="view-btn pdf">📄 PDF Oku</a>` : '';

                card.innerHTML = `
                    <div>
                        <div class="meta">${art.kategori || 'Genel'}</div>
                        <h3>${art.baslik || 'Başlıksız İçerik'}</h3>
                        <p>${art.ozet || ''}</p>
                    </div>
                    <div class="links-group" style="margin-top:20px;">
                        ${webLinkHtml}
                        ${pdfLinkHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // REAKTİF ARAMA FİLTRESİ
        function filterArticles() {
            const query = document.getElementById('mainSearchInput').value.toLowerCase().trim();
            
            // Veri henüz yüklenmediyse filtreleme yapma
            if (!allArticlesData || allArticlesData.length === 0) return;

            const filtered = allArticlesData.filter(art => {
                const baslik = (art.baslik || "").toLowerCase();
                const ozet = (art.ozet || "").toLowerCase();
                const kategori = (art.kategori || "").toLowerCase();
                
                return baslik.includes(query) || ozet.includes(query) || kategori.includes(query);
            });
            displayArticles(filtered);
        }

        // MODAL İÇİ TAKSONOMİ ARAMA MOTORU
        function filterModalTaxonomy() {
            const query = document.getElementById('modalSearchInput').value.toLowerCase().trim();
            
            document.querySelectorAll('.accordion-item').forEach(item => {
                let itemMatch = false;
                
                item.querySelectorAll('.tree-branch').forEach(branch => {
                    let branchMatch = false;
                    
                    branch.querySelectorAll('.leaf-node').forEach(leaf => {
                        const text = leaf.textContent.toLowerCase();
                        if (text.includes(query)) {
                            leaf.style.display = 'flex';
                            branchMatch = true;
                        } else {
                            leaf.style.display = 'none';
                        }
                    });

                    const branchText = branch.querySelector('.branch-header').textContent.toLowerCase();
                    if (branchText.includes(query) || branchMatch) {
                        branch.style.display = 'block';
                        if(query !== "") branch.classList.add('branch-open');
                        itemMatch = true;
                    } else {
                        branch.style.display = 'none';
                        branch.classList.remove('branch-open');
                    }
                });

                const itemText = item.querySelector('.accordion-header').textContent.toLowerCase();
                if (itemText.includes(query) || itemMatch) {
                    item.style.display = 'block';
                    if(query !== "") item.classList.add('open');
                } else {
                    item.style.display = 'none';
                    item.classList.remove('open');
                }
            });
        }

        // MODAL PENCERE YÖNETİMİ
        function openInventoryModal(targetJson = 'inanc.json', targetTabId = 'tab-inanc') {
            document.getElementById('inventoryModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('modalSearchInput').value = "";
            switchModalLayer(targetJson, targetTabId);
        }
        
        function closeInventoryModal() {
            document.getElementById('inventoryModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        function closeInventoryModalOutside(event) {
            if (event.target.id === 'inventoryModal') closeInventoryModal();
        }

        function switchModalLayer(jsonFile, activeTabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(activeTabId).classList.add('active');
            document.getElementById('modalSearchInput').value = "";
            
            const container = document.getElementById('modal-accordion-container');
            container.innerHTML = "<p style='text-align:center; color:#8A857E; font-size:14px;'>Hiyerarşi yükleniyor...</p>";

            fetch('./' + jsonFile)
                .then(response => {
                    if(!response.ok) throw new Error();
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = "";
                    data.forEach(item => {
                        const accordionItem = document.createElement('div');
                        accordionItem.className = 'accordion-item';
                        let branchesHtml = '';
                        item.branches.forEach(branch => {
                            let leavesHtml = '';
                            branch.leaves.forEach(leaf => {
                                leavesHtml += `<div class="leaf-node"><strong>${leaf.id}</strong> <span>${leaf.desc}</span></div>`;
                            });
                            branchesHtml += `
                                <div class="tree-branch">
                                    <div class="branch-header" onclick="toggleBranch(this, event)">
                                        <div><code>${branch.subcode}</code> ${branch.subtitle}</div>
                                        <div class="branch-icon">▼</div>
                                    </div>
                                    <div class="branch-body">${leavesHtml}</div>
                                </div>
                            `;
                        });
                        accordionItem.innerHTML = `
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                <div><code>${item.code}</code> ${item.title}</div>
                                <div class="accordion-icon">▼</div>
                            </div>
                            <div class="accordion-body">${branchesHtml}</div>
                        `;
                        container.appendChild(accordionItem);
                    });
                })
                .catch(() => {
                    container.innerHTML = `<p style='text-align:center; font-size:14px; color:var(--accent);'>Veri dosyası (${jsonFile}) yüklenemedi. Dosya adını kontrol edin.</p>`;
                });
        }

        function toggleAccordion(headerElement) {
            const currentItem = headerElement.parentElement;
            if (!currentItem.classList.contains('open')) {
                currentItem.classList.add('open');
            } else {
                currentItem.classList.remove('open');
                currentItem.querySelectorAll('.tree-branch').forEach(b => b.classList.remove('branch-open'));
            }
        }
        function toggleBranch(branchHeaderElement, event) {
            event.stopPropagation();
            const currentBranch = branchHeaderElement.parentElement;
            if (!currentBranch.classList.contains('branch-open')) {
                currentBranch.classList.add('branch-open');
            } else {
                currentBranch.classList.remove('branch-open');
            }
        }
    </script>
</body>
</html>
